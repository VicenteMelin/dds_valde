<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Review · Valde — Edición Pre-Casado</title>
<style>
/* ============================================================
   PERFORMANCE REVIEW · VALDE — TEMA / ESTILOS
   No necesitas tocar nada aquí salvo que quieras cambiar colores.
   ============================================================ */
:root{
  --bg:#ecf4ed;
  --panel:#ffffff;
  --panel-2:#f2f8f3;
  --ink:#14321f;
  --muted:#54705e;
  --line:#d8e6db;
  --accent:#009739;     /* verde Brasil */
  --accent-2:#c99700;   /* amarillo/oro Brasil (legible) */
  --warn:#e0a100;       /* ámbar */
  --bad:#ef4444;        /* rojo */
  --gold:#c99700;
  --yellow:#FEDD00;     /* amarillo vivo (gradientes) */
  --radius:18px;
  --shadow:0 20px 60px rgba(0,0,0,.45);
  --font:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:radial-gradient(1200px 800px at 70% -10%, #ffffff 0%, var(--bg) 55%);
  color:var(--ink);font-family:var(--font);overflow:hidden;
}

/* ---------- Deck / Slides ---------- */
#deck{position:fixed;top:36px;bottom:34px;left:0;right:0;}
.slide{
  position:absolute;inset:0;display:none;flex-direction:column;
  padding:2.5cqh 6cqw;opacity:0;transition:opacity .45s ease;
  animation:none;
}
.slide.active{display:flex;opacity:1;animation:slideIn .5s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* ---------- Barra superior corporativa ---------- */
.topbar{
  position:fixed;top:0;left:0;right:0;height:36px;z-index:50;
  display:flex;align-items:center;gap:12px;padding:0 18px;
  background:linear-gradient(90deg,#ffffff,var(--panel-2));
  border-top:4px solid;border-image:linear-gradient(90deg,var(--accent) 60%,var(--yellow)) 1;
  border-bottom:1px solid var(--line);font-size:13px;color:var(--muted);
  letter-spacing:.5px;
}
.topbar .logo{display:flex;align-items:center;gap:8px;color:var(--ink);font-weight:700;letter-spacing:1px}
.topbar .logo .dot{width:10px;height:10px;border-radius:3px;background:var(--accent);box-shadow:0 0 12px var(--accent)}
.topbar .spacer{flex:1}
.topbar .confidential{
  border:1px solid var(--bad);color:var(--bad);padding:2px 8px;border-radius:6px;
  font-weight:700;font-size:10px;letter-spacing:1.5px;
}

/* ---------- Footer / progreso ---------- */
.footer{
  position:fixed;bottom:0;left:0;right:0;height:34px;z-index:50;
  display:flex;align-items:center;gap:14px;padding:0 18px;
  border-top:1px solid var(--line);background:#ffffff;font-size:13px;color:var(--muted);
}
.progress{flex:1;height:5px;border-radius:99px;background:var(--panel-2);overflow:hidden}
.progress > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .4s}
.counter{font-variant-numeric:tabular-nums;color:var(--ink);font-weight:600}
.nav-btn{cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);
  border-radius:8px;width:30px;height:24px;display:grid;place-items:center;font-size:13px}
.nav-btn:hover{border-color:var(--accent)}

/* ---------- Tipografía / componentes ---------- */
.kicker{color:var(--accent);font-weight:800;letter-spacing:3px;font-size:16px;text-transform:uppercase;margin-bottom:10px}
.kicker.warn{color:var(--warn)} .kicker.good{color:var(--accent-2)} .kicker.bad{color:var(--bad)}
h1{font-size:74px;line-height:1.02;font-weight:800;letter-spacing:-1px}
h2{font-size:48px;line-height:1.08;font-weight:800;letter-spacing:-.5px}
h3{font-size:25px;font-weight:700}
.sub{color:var(--muted);font-size:24px;margin-top:14px;max-width:60ch;line-height:1.5}
.fill{color:var(--gold);font-style:italic}        /* texto a rellenar */
.center{justify-content:center;align-items:center;text-align:center}
.center .sub{margin-left:auto;margin-right:auto}

/* badge / chips */
.chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.chip{background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:9px 18px;font-size:16px;color:var(--muted)}

/* ---------- Tarjetas / grid KPI ---------- */
.grid{display:grid;gap:18px;margin-top:auto;margin-bottom:auto}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.card{
  background:linear-gradient(180deg,var(--panel),var(--panel-2));
  border:1px solid var(--line);border-radius:var(--radius);padding:24px;position:relative;overflow:hidden;
  box-shadow:0 6px 20px rgba(31,41,55,.06);
}
.card .label{color:var(--muted);font-size:16px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.kpi{font-size:58px;font-weight:800;line-height:1;margin-top:10px;letter-spacing:-1px}
.kpi.green{color:var(--accent-2)} .kpi.blue{color:var(--accent)} .kpi.gold{color:var(--gold)}
.kpi.red{color:var(--bad)} .kpi.warn{color:var(--warn)}
.kpi small{font-size:22px;color:var(--muted);font-weight:600}
.delta{margin-top:10px;font-size:14px;font-weight:700}
.delta.up{color:var(--accent-2)} .delta.down{color:var(--bad)}
.card .note{color:var(--muted);font-size:16px;margin-top:8px;line-height:1.45}

/* ---------- Quiz estilo concurso ---------- */
.quiz-q{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:2px solid var(--accent);border-radius:18px;box-shadow:0 8px 24px rgba(31,41,55,.1);padding:30px 40px;text-align:center;font-size:34px;font-weight:800;color:var(--ink);margin-top:14px;line-height:1.2}
.quiz-ops{display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;margin-top:24px;align-content:center}
.quiz-op{display:flex;align-items:center;gap:20px;background:linear-gradient(180deg,var(--panel),var(--panel-2));border:2px solid var(--accent);border-radius:14px;padding:22px 28px;box-shadow:0 6px 18px rgba(31,41,55,.08)}
.q-letter{flex-shrink:0;width:48px;height:48px;border-radius:50%;background:var(--gold);color:#1f2937;font-weight:800;font-size:24px;display:grid;place-items:center}
.q-text{font-size:25px;font-weight:600;color:var(--ink)}

/* ---------- Footage (videos) ---------- */
.foot-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.footage-vid{max-height:58cqh;max-width:88%;border-radius:16px;box-shadow:0 12px 32px rgba(31,41,55,.2);object-fit:contain;background:#000}

/* ---------- Pull quote ---------- */
.pquote{margin-top:22px;position:relative;text-align:center;padding-top:24px}
.pquote::before{content:"\201C";position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:88px;line-height:1;color:var(--accent);opacity:.22;font-family:Georgia,'Times New Roman',serif}
.pq-text{display:block;font-size:34px;font-style:italic;font-weight:800;color:var(--accent);line-height:1.2}
.pq-by{display:block;margin-top:10px;font-size:17px;font-weight:600;color:var(--muted)}

/* ---------- Galería de fotos (álbum) ---------- */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:1fr;gap:18px;flex:1;margin-top:18px;min-height:0}
.gal-item{background:var(--panel);border:1px solid var(--line);border-top:6px solid var(--accent);border-radius:14px;box-shadow:0 6px 18px rgba(31,41,55,.08);overflow:hidden;display:flex;flex-direction:column}
.pilar-num{font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);text-align:center;padding:12px 0 4px}
.gal-photo{flex:1;background-size:contain;background-repeat:no-repeat;background-position:center;background-color:var(--panel-2);min-height:0;margin:0 12px;border-radius:10px}
.gal-cap{padding:12px 14px 16px;text-align:center;line-height:1.2}
.pilar-name{font-size:24px;font-weight:800;color:var(--ink)}
.pilar-desc{font-size:14px;color:var(--muted);margin-top:4px}
.team-item{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 6px 18px rgba(31,41,55,.08);overflow:hidden;display:flex;flex-direction:column}
.team-item .gal-photo{margin:12px 12px 0}
.team-cap{padding:14px 12px 18px;text-align:center;font-size:21px;font-weight:800;color:var(--ink)}

/* ---------- Timeline de fotos chistosas ---------- */
.ptl{position:relative;display:flex;justify-content:space-between;gap:12px;flex:1;margin-top:28px;padding:0 8px}
.ptl::before{content:"";position:absolute;left:50px;right:50px;top:236px;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:2px;z-index:0}
.ptl-item{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:15.5%}
.ptl-photo{width:100%;height:220px;border-radius:14px;background-size:cover;background-position:center;border:4px solid #fff;box-shadow:0 8px 22px rgba(31,41,55,.18)}
.ptl-dot{width:18px;height:18px;border-radius:50%;background:var(--accent);border:3px solid #fff;box-shadow:0 0 0 2px var(--accent);margin:8px 0 12px}
.ptl-cap{font-size:15px;color:var(--ink);font-weight:600;text-align:center;line-height:1.35}
/* Variante grande (timeline de exes, 3 fotos) */
.ptl.ptl-big{justify-content:center;gap:60px}
.ptl.ptl-big::before{left:90px;right:90px;top:316px}
.ptl.ptl-big .ptl-item{width:25%}
.ptl.ptl-big .ptl-photo{height:300px}
.ptl-name{font-size:26px;font-weight:800;color:var(--ink);margin-top:2px}
.ptl-sub{font-size:15px;color:var(--gold);font-style:italic;margin-top:2px}

/* ---------- Tarjetas del veredicto (grandes) ---------- */
.verd-card{padding:40px 34px;display:flex;flex-direction:column;justify-content:center}
.verd-card .label{font-size:18px;margin-bottom:6px}
.verd-card .note{font-size:18px;margin-top:14px}

/* ---------- Card de relaciones (grande, centrada) ---------- */
.rel-card{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 26px}
.rel-card .label{font-size:22px;margin-bottom:6px}
.rel-card .kpi{font-size:78px}
.rel-card > .note{font-size:20px;margin-top:10px}
.rel-card .ex-thumbs{justify-content:center}

/* ---------- Thumbnails de exes (card Novias formales) ---------- */
.ex-thumbs{display:flex;gap:11px;margin-top:18px;flex-wrap:wrap}
.ex-thumb{display:flex;flex-direction:column;align-items:center;gap:7px}
.ex-thumb-img{width:72px;height:72px;border-radius:12px;background-size:cover;background-position:center;border:2px solid var(--line)}
.ex-thumb span{font-size:15px;color:var(--muted);font-weight:600}
.ex-thumb.win .ex-thumb-img{border-color:var(--accent-2);border-width:3px}
.ex-thumb.win span{color:var(--accent-2)}

/* ---------- Análisis FODA ---------- */
.foda{display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;gap:14px;flex:1;margin-top:12px}
.foda-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 24px rgba(31,41,55,.07);padding:16px 28px;border-left:8px solid var(--accent);display:flex;flex-direction:column;justify-content:center}
.foda-card.f{border-left-color:var(--accent-2)}
.foda-card.o{border-left-color:var(--accent)}
.foda-card.d{border-left-color:var(--warn)}
.foda-card.a{border-left-color:var(--bad)}
.foda-card h3{font-size:31px;font-weight:800;margin-bottom:10px}
.foda-card.f h3{color:var(--accent-2)} .foda-card.o h3{color:var(--accent)}
.foda-card.d h3{color:var(--warn)} .foda-card.a h3{color:var(--bad)}
.foda-card ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.foda-card li{font-size:26px;line-height:1.25;color:var(--ink);padding-left:30px;position:relative}
.foda-card li::before{content:"›";position:absolute;left:0;font-weight:800;color:var(--muted)}

/* ---------- Funnel de conquista (dinámica) ---------- */
.cf-stage{position:relative;flex:1;margin-top:18px;display:flex;flex-direction:column;justify-content:center}
.cf-row{margin-bottom:18px;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 4px 14px rgba(31,41,55,.06);padding:20px 30px;display:flex;align-items:center;gap:18px}
.cf-step{width:44px;height:44px;flex-shrink:0;border-radius:50%;background:var(--accent);color:#fff;font-weight:800;display:grid;place-items:center;font-size:22px}
.cf-lbl{flex:1;font-size:24px;font-weight:600;color:var(--ink)}
.cf-val{font-size:28px;font-weight:800;color:var(--accent)}
.cf-tac{position:absolute;right:0;top:2px;width:40%;height:62cqh;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 34px rgba(31,41,55,.14);overflow:hidden;display:flex;flex-direction:column}
.cf-photo{width:100%;height:44cqh;object-fit:contain;display:block;background-size:contain;background-repeat:no-repeat;background-position:center;background-color:var(--panel);flex-shrink:0}
.cf-photo.ph{display:grid;place-items:center;background:repeating-linear-gradient(45deg,#eef6ef,#eef6ef 12px,#e0eee3 12px,#e0eee3 24px);color:var(--muted);text-align:center}
.cf-ph-desc{color:var(--gold);font-style:italic;font-size:16px;margin-top:8px;padding:0 18px;max-width:30ch}
.cf-tac-txt{padding:16px 26px;flex:1;display:flex;flex-direction:column;justify-content:center}
.cf-tac-k{color:var(--accent);font-weight:800;letter-spacing:1px;font-size:19px;text-transform:uppercase}
.cf-tac-txt h3{font-size:29px;margin-top:8px;color:var(--ink)}
.cf-tac-txt p{color:var(--muted);font-size:20px;margin-top:8px;line-height:1.4}

/* ---------- Reveal por fragmentos (flechas) ---------- */
.frag{opacity:0;transform:translateY(16px) scale(.98);transition:opacity .45s ease,transform .45s ease}
.frag.shown{opacity:1;transform:none}

/* ---------- Tarjetas de agenda (más grandes) ---------- */
.agenda-card{padding:42px;display:flex;flex-direction:column;justify-content:center}
.agenda-card .label{font-size:18px}
.agenda-card h3{font-size:27px;margin-top:0}
.agenda-card .note{font-size:17px;margin-top:5px}
.ag-num{font-size:42px;font-weight:900;color:var(--accent);min-width:44px;text-align:center;flex-shrink:0}

/* ---------- Perfil estilo LinkedIn ---------- */
.li-wrap{display:grid;grid-template-columns:1.15fr 1fr;gap:18px;flex:1;margin-top:4px;min-height:0;align-items:start}
.li-card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 6px 20px rgba(31,41,55,.06);overflow:hidden}
.li-profile{position:relative;display:flex;flex-direction:column}
.li-banner{height:104px;flex-shrink:0;background:linear-gradient(120deg,#00612a,#009739 55%,#FEDD00 130%);position:relative;overflow:hidden}
.li-banner-txt{position:absolute;right:28px;top:50%;transform:translateY(-50%);font-size:46px;font-weight:900;color:#fff;letter-spacing:.5px;text-shadow:0 2px 10px rgba(0,0,0,.28);white-space:nowrap}
.li-avatar{width:128px;height:128px;border-radius:50%;border:5px solid #fff;object-fit:cover;position:absolute;top:38px;left:32px;background:#dfe5ef}
.li-body{padding:64px 36px 20px}
.li-name{font-size:31px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:9px}
.li-badge{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:14px;display:grid;place-items:center}
.li-1er{font-size:17px;color:var(--muted);font-weight:600}
.li-headline{font-size:23px;font-weight:700;color:var(--ink);margin-top:9px;line-height:1.3}
.li-cargo-detail{font-size:15px;color:var(--muted);margin-top:6px;line-height:1.4}
.li-realrole{font-size:14px;color:var(--muted);margin-top:7px;font-style:italic}
.li-meta{font-size:16px;color:var(--muted);margin-top:10px}
.li-link{color:var(--accent);font-weight:600}
.li-conn{color:var(--accent);font-weight:700;font-size:16px;margin-top:7px}
.li-orgs{display:flex;flex-wrap:wrap;gap:18px;margin-top:12px}
.li-org{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:600;color:var(--ink)}
.li-org .li-sq{width:26px;height:26px;border-radius:6px;background:var(--panel-2);border:1px solid var(--line);display:grid;place-items:center;font-size:15px}
.li-btns{display:flex;gap:12px;margin-top:14px}
.li-btn{border-radius:99px;padding:10px 24px;font-size:16px;font-weight:700;cursor:default;border:1.5px solid var(--accent);background:#fff;color:var(--accent)}
.li-btn.primary{background:var(--accent);color:#fff}
.li-side{display:flex;flex-direction:column;gap:13px;min-height:0}
.li-side .li-card{padding:15px 22px}
.li-h3{font-size:20px;font-weight:800;color:var(--ink);margin-bottom:8px}
.li-about{font-size:14px;line-height:1.45;color:var(--ink)}
.li-exp{display:flex;gap:13px;align-items:flex-start}
.li-exp-ico{width:40px;height:40px;border-radius:10px;background:var(--panel-2);border:1px solid var(--line);display:grid;place-items:center;font-size:21px;flex-shrink:0}
.li-exp b{font-size:18px;color:var(--ink)}
.li-exp-sub{font-size:14px;color:var(--muted);margin-top:2px}
.li-exp-note{font-size:15px;color:var(--ink);margin-top:6px;line-height:1.45}
.li-exp-metric{display:inline-block;margin-top:5px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.35);color:var(--bad);font-weight:800;font-size:15px;padding:5px 12px;border-radius:99px}
.li-exp-metric span{font-weight:600;color:var(--muted)}
.li-exp-metric.good{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:#15803d}
.li-metrics{display:flex;gap:8px;flex-wrap:wrap}
.li-steps{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.li-steps span{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);font-size:13px;font-weight:600;padding:4px 10px;border-radius:7px}

/* ---------- Placeholders de foto ---------- */
.photo,.photo-anim{
  border-radius:var(--radius);display:grid;place-items:center;text-align:center;
  color:var(--muted);position:relative;min-height:0;
}
.photo{border:2px dashed var(--line);background:repeating-linear-gradient(45deg,#eef6ef,#eef6ef 12px,#e0eee3 12px,#e0eee3 24px)}
.photo-anim{border:2px dashed var(--accent);background:rgba(59,130,246,.06)}
.photo .ph-inner,.photo-anim .ph-inner{padding:20px}
.photo .ph-ico{font-size:46px;opacity:.6}
.photo-anim .ph-ico{font-size:46px}
.ph-tag{display:inline-block;margin-top:10px;font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.photo .ph-tag{color:var(--muted)} .photo-anim .ph-tag{color:var(--accent)}
.ph-desc{margin-top:8px;color:var(--gold);font-style:italic;font-size:15px;max-width:34ch}
.photo-anim::after{content:"▶ ANIMADA / GIF";position:absolute;top:10px;right:12px;font-size:10px;font-weight:800;letter-spacing:1px;color:var(--accent)}

.split{display:grid;grid-template-columns:1fr 1fr;gap:30px;flex:1;align-items:center}
.split.wide-left{grid-template-columns:1.3fr 1fr}
.split > .photo,.split > .photo-anim{height:62cqh}

/* ---------- Gráfico de barras (CSS) ---------- */
.bars{display:flex;align-items:flex-end;gap:18px;height:46cqh;padding-top:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bar{width:70%;border-radius:10px 10px 4px 4px;background:linear-gradient(180deg,var(--accent),#00612a);
  height:0;transition:height 1s cubic-bezier(.2,.7,.2,1);position:relative;min-height:4px}
.bar.alt{background:linear-gradient(180deg,var(--yellow),#a68a00)}
.bar .val{position:absolute;top:-28px;left:0;right:0;text-align:center;font-weight:800;font-size:18px}
.bar-lbl{margin-top:10px;color:var(--muted);font-size:16px;text-align:center}

/* ---------- Línea de tiempo ---------- */
.timeline{position:relative;margin-top:30px;padding-left:6px;flex:1}
.timeline::before{content:"";position:absolute;left:18px;top:0;bottom:0;width:3px;background:var(--line)}
.tl-item{position:relative;padding:0 0 26px 56px}
.tl-item .dot{position:absolute;left:9px;top:2px;width:22px;height:22px;border-radius:50%;
  background:var(--accent);border:4px solid var(--bg);box-shadow:0 0 0 3px var(--accent)}
.tl-item h3{margin-bottom:4px}
.tl-item .when{color:var(--accent);font-weight:700;font-size:16px;letter-spacing:1px}
.tl-item .what{color:var(--muted);font-size:19px;margin-top:4px;line-height:1.5}

/* ---------- Gauge / medidor (SVG) ---------- */
.gauge-wrap{display:flex;align-items:center;justify-content:center;gap:30px}
.gauge{position:relative;width:240px;height:240px}
.gauge .num{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.gauge .num b{font-size:46px;font-weight:800;display:block}
.gauge .num span{color:var(--muted);font-size:13px;letter-spacing:1px}

/* ---------- Funnel ---------- */
.funnel{display:flex;flex-direction:column;gap:10px;flex:1;justify-content:center;max-width:760px;margin:0 auto;width:100%}
.funnel-row{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:16px 22px;display:flex;justify-content:space-between;align-items:center;margin:0 auto}
.funnel-row b{font-size:32px}
.funnel-row span{color:var(--muted);font-size:19px}

/* ---------- Ranking ---------- */
.rank{display:flex;flex-direction:column;gap:12px;flex:1;justify-content:center}
.rank-row{display:flex;gap:18px;align-items:center;background:var(--panel);border:1px solid var(--line);
  border-radius:12px;padding:14px 20px}
.rank-row .pos{font-size:30px;font-weight:800;color:var(--gold);width:48px;text-align:center}
.rank-row .body h3{font-size:23px}
.rank-row .body p{color:var(--muted);font-size:17px;margin-top:2px}

/* ---------- Star / competencia ratings ---------- */
.skills{display:flex;flex-direction:column;gap:18px;flex:1;justify-content:center;max-width:820px}
.skill{display:grid;grid-template-columns:240px 1fr 60px;align-items:center;gap:18px}
.skill .name{font-weight:700;font-size:20px}
.skill .track{height:14px;background:var(--panel-2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.skill .track i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width 1s}
.skill .score{font-weight:800;text-align:right;color:var(--accent-2)}

/* scatter joke */
.scatter{flex:1;position:relative;border-left:2px solid var(--line);border-bottom:2px solid var(--line);margin:30px 60px}
.scatter .pt{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--gold);transform:translate(-50%,50%);box-shadow:0 0 12px var(--gold)}
.scatter .axis-x{position:absolute;bottom:-30px;width:100%;text-align:center;color:var(--muted)}
.scatter .axis-y{position:absolute;left:-46px;top:50%;transform:rotate(-90deg);color:var(--muted);white-space:nowrap}
.scatter .trend{position:absolute;left:0;bottom:0;width:140%;height:2px;background:var(--bad);transform-origin:left;transform:rotate(-32deg);opacity:.7}

/* stamp */
.stamp{position:absolute;top:50%;right:8cqw;transform:translateY(-50%) rotate(-14deg);
  border:6px solid var(--accent-2);color:var(--accent-2);font-weight:900;font-size:34px;
  letter-spacing:3px;padding:14px 26px;border-radius:14px;opacity:.92;text-transform:uppercase}

.hint{position:fixed;bottom:50px;right:18px;font-size:11px;color:var(--muted);z-index:40;opacity:.6}
.two-col-list{columns:2;column-gap:40px;margin-top:20px}
.two-col-list li{margin:0 0 16px;break-inside:avoid;color:var(--muted);font-size:21px;line-height:1.4;list-style:none;
  padding-left:26px;position:relative}
.two-col-list li::before{content:"›";position:absolute;left:0;color:var(--accent);font-weight:800}
.two-col-list li b{color:var(--ink)}
ul.clean{list-style:none}
.section-num{font-size:160px;font-weight:900;color:rgba(31,41,55,.05);position:absolute;right:5cqw;top:8cqh;line-height:1}

/* ---------- ¿A cuál más smash? (elección del novio) ---------- */
.smash-grid{display:grid;gap:20px;flex:1;margin-top:16px;align-content:center}
.smash-card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);
  border-radius:16px;box-shadow:0 6px 18px rgba(31,41,55,.08);padding:16px 14px;display:flex;
  flex-direction:column;align-items:center;position:relative}
.smash-photo{height:clamp(84px,20cqh,200px);aspect-ratio:1/1;width:auto;max-width:100%;border-radius:50%;
  background-size:cover;background-position:center top;
  border:4px solid var(--accent);background-color:var(--panel-2);display:grid;place-items:center;
  color:var(--muted);text-align:center;overflow:hidden}
.smash-photo .ph-ico{font-size:40px;opacity:.5}
.smash-photo .ph-mini{font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.smash-name{margin-top:12px;font-size:21px;font-weight:800;color:var(--ink);text-align:center;line-height:1.15}
.smash-tag{margin-top:2px;font-size:14px;color:var(--gold);font-style:italic;text-align:center}
.smash-heart{position:absolute;top:10px;right:12px;font-size:20px}

/* ============================================================
   ESCALAR-PARA-CABER (webapp en celular / cualquier pantalla)
   El contenido se maqueta en un lienzo fijo 16:9 (#stage) y se
   escala completo para caber en la pantalla, igual que en la tele.
   Un tap = lámina completa siguiente. Sin scroll, sin cortes.
   El JS calcula la escala; las medidas internas usan cqh/cqw
   (relativas al lienzo, no a la ventana).
   ============================================================ */
#deck{overflow:hidden}
#stage{position:absolute;top:0;left:0;width:1280px;height:650px;
       transform-origin:top left;container-type:size;will-change:transform}

/* Pantallas chicas/bajas: barras y ayuda más compactas (el lienzo escala solo) */
@media (max-width:820px), (max-height:600px){
  .topbar{height:30px;font-size:11px;padding:0 12px}
  .footer{height:44px;gap:10px;padding:0 12px}
  .nav-btn{width:44px;height:34px;font-size:20px}
  .hint{display:none}
  #deck{top:30px;bottom:44px}
}

/* Aviso para girar el teléfono (solo en vertical): el lienzo es 16:9 y luce
   mucho mejor en horizontal / al espejar a la TV. */
.rotate-hint{display:none}
@media (orientation:portrait) and (max-width:600px){
  .rotate-hint{display:flex;position:fixed;z-index:60;top:46px;left:50%;transform:translateX(-50%);
    align-items:center;gap:8px;background:var(--accent);color:#fff;font-weight:700;font-size:13px;
    padding:9px 16px;border-radius:99px;box-shadow:0 8px 20px rgba(0,0,0,.22);white-space:nowrap}
}

     style="height:${h};width:100%;object-fit:cover;border-radius:var(--radius);border:2px solid var(--accent)"></video>`;

const barChart = (data, alt=false) => {
  const max = Math.max(...data.map(d=>d[1]), 1);
  return `<div class="bars">${data.map(d=>`
    <div class="bar-col">
      <div class="bar ${alt?'alt':''}" data-h="${Math.round(d[1]/max*100)}"><span class="val">${d[1]}</span></div>
      <div class="bar-lbl">${esc(d[0])}</div>
    </div>`).join('')}</div>`;
};

const gauge = (pct, label, big) => {
  const r=100, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<div class="gauge">
    <svg viewBox="0 0 240 240">
      <circle cx="120" cy="120" r="${r}" fill="none" stroke="#e2e7f0" stroke-width="22"/>
      <circle class="gauge-arc" cx="120" cy="120" r="${r}" fill="none" stroke="url(#gg)" stroke-width="22"
        stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c}" data-off="${off}"
        transform="rotate(-90 120 120)"/>
      <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#009739"/><stop offset="1" stop-color="#FEDD00"/></linearGradient></defs>
    </svg>
    <div class="num"><b>${big}</b><span>${esc(label)}</span></div>
  </div>`;
};

// Donut chart (SVG) — data: [etiqueta, %]
const DONUT_COLORS=['#009739','#FEDD00','#00612a','#c99700','#4caf50','#8d6e00'];
const donut = (data, big="100%", small="del sueldo") => {
  const r=88, c=2*Math.PI*r; let acc=0;
  const segs=data.map((d,i)=>{
    const len=d[1]/100*c;
    const s=`<circle cx="120" cy="120" r="${r}" fill="none" stroke="${DONUT_COLORS[i%DONUT_COLORS.length]}"
      stroke-width="40" stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-acc/100*c}"
      transform="rotate(-90 120 120)"/>`;
    acc+=d[1]; return s;
  }).join('');
  return `<svg viewBox="0 0 240 240" style="width:44cqh;height:44cqh;max-width:100%">${segs}
    <circle cx="120" cy="120" r="60" fill="var(--panel)"/>
    <text x="120" y="114" text-anchor="middle" font-size="30" font-weight="800" fill="var(--ink)">${big}</text>
    <text x="120" y="138" text-anchor="middle" font-size="13" fill="var(--muted)">${small}</text></svg>`;
};

// ===== ¿A CUÁL MÁS SMASH? (elección del novio) =====
slides.push(`<div class="slide center">
  <div class="kicker">Dinámica · elección del novio 💍</div>
  <h1>¿A cuál le harías<br>más… smash? 💋</h1>
  <p class="sub">Última oportunidad, Valde. Estas son las candidatas.<br>Elige a la más atractiva. Sin presión. 😏</p>
</div>`);

slides.push((()=>{
  const As=D.asistentes||[];
  const cols=Math.min(Math.max(As.length,1),5);
  return `<div class="slide">
    <div class="kicker">Elección del novio</div>
    <h2>Las candidatas 💃</h2>
    <div class="smash-grid" style="grid-template-columns:repeat(${cols},1fr)">
      ${As.map(a=>`<div class="smash-card frag">
        <div class="smash-heart">❤️</div>
        <div class="smash-photo" style="${a.img?`background-image:url('${a.img}')`:''}">
          ${a.img?'':`<div><div class="ph-ico">📷</div><div class="ph-mini">Foto</div></div>`}
        </div>
        <div class="smash-name">${esc(a.nombre)}</div>
        ${a.tag?`<div class="smash-tag">${esc(a.tag)}</div>`:''}
      </div>`).join('')}
    </div>
  </div>`;
})());

// ===== TRIVIA (estilo concurso) =====
slides.push(`<div class="slide center">
  <div class="kicker">Trivia · estilo concurso</div>
  <h1>¿Cuánto<br>conocés a Valde?</h1>
  <p class="sub">10 preguntas. 4 alternativas. El que falla… ya sabe. 🍺</p>
</div>`);

(D.quiz||[]).forEach((it,i)=>{
  slides.push(`<div class="slide">
    <div class="kicker">Pregunta ${i+1} de ${D.quiz.length}</div>
    <div class="quiz-q">${esc(it.q)}</div>
    <div class="quiz-ops">
      ${it.op.map((o,k)=>`<div class="quiz-op frag"><span class="q-letter">${'ABCD'[k]}</span><span class="q-text">${esc(o)}</span></div>`).join('')}
    </div>
  </div>`);
});

// ===== SECCIÓN DINÁMICAS / JUEGOS — pendiente, la armamos después =====
// (Los juegos quedan en DATA.juegos para cuando definamos esta parte.)

// ---------- RENDER & NAVEGACIÓN ----------
const deck=document.getElementById('deck');
deck.innerHTML='<div id="stage"></div>';
const stage=document.getElementById('stage');
stage.innerHTML=slides.join('');
const els=[...stage.querySelectorAll('.slide')];

// Escalar-para-caber: el lienzo 1280x650 se escala para llenar el área visible.
const STAGE_W=1280, STAGE_H=650;
function fit(){
  const dw=deck.clientWidth, dh=deck.clientHeight;
  const s=Math.min(dw/STAGE_W, dh/STAGE_H);
  const x=(dw-STAGE_W*s)/2, y=(dh-STAGE_H*s)/2;
  stage.style.transform=`translate(${x}px,${y}px) scale(${s})`;
}
window.addEventListener('resize',fit);
window.addEventListener('orientationchange',()=>setTimeout(fit,60));
fit();

let idx=0, frag=0;
document.getElementById('tot').textContent=els.length;
document.getElementById('periodo').textContent="Periodo "+D.periodoEvaluado;

function animateIn(el){
  el.querySelectorAll('.bar[data-h]').forEach(b=>setTimeout(()=>b.style.height=b.dataset.h+'%',60));
  el.querySelectorAll('.skill .track i[data-w]').forEach(i=>setTimeout(()=>i.style.width=i.dataset.w+'%',60));
  el.querySelectorAll('.gauge-arc[data-off]').forEach(a=>{a.style.transition='stroke-dashoffset 1.2s ease';setTimeout(()=>a.style.strokeDashoffset=a.dataset.off,80);});
}
function frags(el){return [...el.querySelectorAll('.frag')];}
function applyFrags(el,count){frags(el).forEach((f,i)=>f.classList.toggle('shown',i<count));syncFootage(el);}
// Reproduce el video del último wrapper revelado (data-foot); pausa los demás.
function syncFootage(el){
  const wraps=[...el.querySelectorAll('[data-foot]')];
  if(!wraps.length) return;
  let top=-1; wraps.forEach((w,k)=>{if(w.classList.contains('shown'))top=k;});
  wraps.forEach((w,k)=>{
    const v=w.querySelector('video'); if(!v)return;
    if(k===top){ w.style.zIndex=2; if(v.paused){try{v.currentTime=0;}catch(_){} v.play().catch(()=>{});} }
    else { w.style.zIndex=1; if(!v.paused) v.pause(); }
  });
}
// fc: cantidad de fragmentos visibles al entrar. undefined/0 = ninguno (revela con flechas); -1 = todos.
function show(n,fc){
  idx=Math.max(0,Math.min(els.length-1,n));
  els.forEach((e,i)=>{const act=i===idx;e.classList.toggle('active',act);if(!act)e.querySelectorAll('video').forEach(v=>v.pause());});
  const total=frags(els[idx]).length;
  frag = fc===undefined ? 0 : (fc<0 ? total : Math.min(fc,total));
  applyFrags(els[idx],frag);
  document.getElementById('cur').textContent=idx+1;
  document.getElementById('bar').style.width=((idx+1)/els.length*100)+'%';
  animateIn(els[idx]);
  els[idx].querySelectorAll('video:not(.footage-vid)').forEach(v=>v.play().catch(()=>{}));
}
function next(){
  const total=frags(els[idx]).length;
  if(frag<total){frag++;applyFrags(els[idx],frag);}
  else show(idx+1,0);
}
function prev(){
  if(frag>0){frag--;applyFrags(els[idx],frag);}
  else show(idx-1,-1);   // al volver, muestra todos los fragmentos de la slide anterior
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev();}
  else if(e.key==='Home'){show(0,0);} else if(e.key==='End'){show(els.length-1,-1);}
  else if(e.key.toLowerCase()==='f'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
});
// ---------- Tap / click en pantalla = avanzar (flecha derecha) + swipe ----------
(function(){
  const deck=document.getElementById('deck');
  // No avanzar si el toque cae sobre algo interactivo (links, video con controles, botones...)
  const isInteractive=el=>el.closest && el.closest('a,button,input,textarea,select,video[controls],.no-advance');
  let sx=0,sy=0,moved=false;
  deck.addEventListener('touchstart',e=>{const t=e.changedTouches[0];sx=t.clientX;sy=t.clientY;moved=false;},{passive:true});
  deck.addEventListener('touchmove',e=>{const t=e.changedTouches[0];if(Math.abs(t.clientX-sx)>10||Math.abs(t.clientY-sy)>10)moved=true;},{passive:true});
  deck.addEventListener('touchend',e=>{
    if(isInteractive(e.target))return;
    const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;
    if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){e.preventDefault();dx<0?next():prev();} // swipe: izq=avanza, der=retrocede
  },{passive:false});
  deck.addEventListener('click',e=>{
    if(isInteractive(e.target))return;
    if(moved){moved=false;return;}   // fue un swipe o scroll, no un tap
    next();
  });
})();
show(0);
</script>
